<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snake Pro</title>

<style>

body{
  margin:0;
  overflow:hidden;
  background:#111;
  font-family:Arial;
}

canvas{
  display:block;
  margin:auto;
  background:#151515;
}

/* UI */
#ui{
  position:absolute;
  top:12px;
  left:12px;
  color:yellow;
  font-size:24px;
  font-weight:bold;
  z-index:10;
}

/* START SCREEN PRO */
#startScreen{
  position:absolute;
  inset:0;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:18px;

  background: radial-gradient(circle at top, #1b1b1b, #000);
  z-index:1000;
  overflow:hidden;
}

/* TITLE */
#title{
  font-size:70px;
  font-weight:900;
  color:#7cff5b;
  text-shadow:0 0 10px #4ad14a,0 0 30px #2fff2f;
  animation:pulse 1.8s infinite;
}

#subtitle{
  color:#aaa;
  font-size:18px;
  letter-spacing:2px;
  margin-top:-10px;
  text-align:center;
}

#startBtn{
  width:240px;
  height:70px;
  border:none;
  border-radius:18px;
  background:linear-gradient(145deg,#4ad14a,#2e9b2e);
  color:white;
  font-size:28px;
  font-weight:bold;
  cursor:pointer;
}

#crazyToggle{
  width:240px;
  height:55px;
  border:none;
  border-radius:14px;
  background:#6a2cff;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

/* GAME OVER */
#gameover{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.84);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#loseText{
  color:#ff4444;
  font-size:42px;
  font-weight:bold;
}

#scoreText{
  color:yellow;
  font-size:28px;
  margin-top:18px;
}

#restartBtn{
  margin-top:30px;
  width:200px;
  height:65px;
  border:none;
  border-radius:20px;
  background:#4ad14a;
  color:white;
  font-size:28px;
  font-weight:bold;
}

/* DPAD (ONLY ADDITION) */
.dpadBtn{
  position:absolute;
  width:70px;
  height:70px;
  border:none;
  border-radius:50%;
  background:#333;
  color:white;
  font-size:26px;
  z-index:20;
}

#up{ left:90px; bottom:130px; }
#down{ left:90px; bottom:30px; }
#left{ left:10px; bottom:80px; }
#right{ left:170px; bottom:80px; }

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

</style>
</head>

<body>

<div id="ui">رصيد الستر: 0</div>

<div id="startScreen">

  <div id="title">SNAKE</div>

  <div id="subtitle">
    𝖉𝖊𝖛𝖊𝖑𝖔𝖕𝖊𝖉 𝖇𝖞<br>
    𝐅 𝐀 𝐍 𝐆  𝐘 𝐔 𝐀 𝐍
  </div>

  <button id="startBtn" onclick="startGame(); playAhh()">START GAME</button>
  <button id="crazyToggle" onclick="toggleCrazy(); playAhh()">CRAZY OFF</button>

</div>

<div id="gameover">
  <div id="loseText">ههههه خسرت يقحبة</div>
  <div id="scoreText">رصيد الستر: 0</div>

  <button id="restartBtn" onclick="restartGame()">Restart</button>
  <button onclick="goHome()" style="margin-top:15px;width:60px;height:60px;border:none;border-radius:50%;font-size:28px;background:#333;color:white;">🏠</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<button class="dpadBtn" id="up" onclick="setDir(0,-1)">▲</button>
<button class="dpadBtn" id="down" onclick="setDir(0,1)">▼</button>
<button class="dpadBtn" id="left" onclick="setDir(-1,0)">◄</button>
<button class="dpadBtn" id="right" onclick="setDir(1,0)">►</button>

<div id="fade" style="
position:absolute;
inset:0;
background:black;
opacity:0;
pointer-events:none;
transition:opacity 1.5s linear;
z-index:9999;
"></div>

<script>

/* ===== جميع الأصوات الآن محلية (MP3) بنفس مجلد html أو مجلد www ===== */
const eatSound = new Audio("eat.mp3");
const loseSound = new Audio("lose.mp3");
const laughSound = new Audio("laugh.mp3");
const homeSound = new Audio("home.mp3");
const ahhSound = new Audio("ahh.mp3");

// الأصوات الاستفزازية (21 صوتًا) بنفس المجلد بأسماء taunt1.mp3 .. taunt21.mp3
const tauntSounds = [];
for(let i = 1; i <= 24; i++) {
  tauntSounds.push(new Audio(`taunt${i}.mp3`));
}

// متغيرات لإدارة الأصوات العشوائية في الوضع المجنون
let tauntTimer = null;
let isTauntPlaying = false;

// تشغيل صوت استفزازي عشوائي مع مراعاة عدم التداخل
function playRandomTaunt() {
  if (!crazy) return;
  if (isTauntPlaying) return;
  if (tauntSounds.length === 0) return;
  
  let randomIndex = Math.floor(Math.random() * tauntSounds.length);
  let sound = tauntSounds[randomIndex];
  sound.currentTime = 0;
  isTauntPlaying = true;
  
  sound.onended = () => {
    isTauntPlaying = false;
  };
  
  sound.play().catch(e => console.log("خطأ في تشغيل صوت استفزازي:", e));
}

// بدء المؤقت العشوائي مع إمكانية تحديد أول تأخير قصير (لضمان صوت خلال أول 10 ثواني)
function startCrazyTauntTimer(isFirst = false) {
  if (tauntTimer) clearTimeout(tauntTimer);
  if (!crazy) return;
  if (!started || dead) return;
  
  let delay;
  if (isFirst) {
    // أول مرة: تأخير بين 2 و 10 ثواني (2000 - 10000 مللي)
    delay = Math.floor(Math.random() * 8000) + 2000; // 2-10 ثواني
  } else {
    // بعد ذلك: تأخير بين 5 و 30 ثانية
    delay = Math.floor(Math.random() * 25000) + 5000; // 5-30 ثانية
  }
  
  tauntTimer = setTimeout(() => {
    if (crazy && started && !dead) {
      playRandomTaunt();
      startCrazyTauntTimer(false); // المرة التالية تكون عادية
    }
  }, delay);
}

function stopCrazyTauntTimer() {
  if (tauntTimer) {
    clearTimeout(tauntTimer);
    tauntTimer = null;
  }
}

/* ===== GAME ===== */
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let crazy = false;
let started = false;
let dead = false;

const size = 20;
const cols = 20;
const rows = 30;

let snake = [{x:10,y:10}];
let dirX = 1, dirY = 0;
let nextX = 1, nextY = 0;

let score = 0;
let food = {x:10,y:15};

// متغيرات سلوك الطعام المجنون
let crazyCounter = 0;
let farFromSnakeFrames = 0;

function isSafeCell(x, y) {
  return !snake.some(seg => seg.x === x && seg.y === y);
}

function getRandomSafeCell() {
  let safeCells = [];
  for(let i=0; i<cols; i++) {
    for(let j=0; j<rows; j++) {
      if(isSafeCell(i,j)) safeCells.push({x:i, y:j});
    }
  }
  if(safeCells.length === 0) return {x:5, y:5};
  return safeCells[Math.floor(Math.random() * safeCells.length)];
}

function getNearbySafeCell(maxDistance) {
  let candidates = [];
  for(let dx = -maxDistance; dx <= maxDistance; dx++) {
    for(let dy = -maxDistance; dy <= maxDistance; dy++) {
      let nx = food.x + dx;
      let ny = food.y + dy;
      if(nx>=0 && nx<cols && ny>=0 && ny<rows && isSafeCell(nx,ny) && !(dx===0 && dy===0)) {
        let dist = Math.abs(dx) + Math.abs(dy);
        if(dist <= maxDistance) candidates.push({x:nx, y:ny, dist:dist});
      }
    }
  }
  if(candidates.length === 0) return getRandomSafeCell();
  candidates.sort((a,b) => a.dist - b.dist);
  return candidates[Math.floor(Math.random() * Math.min(3, candidates.length))];
}

function evadeNearby() {
  let newPos = getNearbySafeCell(4);
  if(newPos) food = newPos;
}

function evadeFarRandom() {
  let newPos = getRandomSafeCell();
  if(newPos) food = newPos;
}

function moveFoodTowardSnake() {
  let head = snake[0];
  let bestDist = Infinity;
  let bestMove = null;
  let directions = [[0,1],[0,-1],[1,0],[-1,0]];
  for(let d of directions) {
    let nx = food.x + d[0];
    let ny = food.y + d[1];
    if(nx>=0 && nx<cols && ny>=0 && ny<rows && isSafeCell(nx,ny)) {
      let dist = Math.abs(nx - head.x) + Math.abs(ny - head.y);
      if(dist < bestDist) {
        bestDist = dist;
        bestMove = {x:nx, y:ny};
      }
    }
  }
  if(bestMove) food = bestMove;
}

/* START */
function startGame(){
  document.getElementById("startScreen").style.display = "none";
  started = true;
  crazyCounter = 0;
  farFromSnakeFrames = 0;
  if (crazy) startCrazyTauntTimer(true); // أول مرة تأخير قصير
}

/* CRAZY */
function toggleCrazy(){
  crazy = !crazy;
  document.getElementById("crazyToggle").innerText =
    crazy ? "CRAZY ON" : "CRAZY OFF";
  crazyCounter = 0;
  farFromSnakeFrames = 0;
  
  if (crazy && started && !dead) {
    startCrazyTauntTimer(true); // عند تفعيله، أول صوت خلال 10 ثوانٍ
  } else {
    stopCrazyTauntTimer();
  }
}

function playAhh(){
  ahhSound.currentTime = 0;
  ahhSound.play();
}

function setDir(x,y){
  if(x === -dirX && y === -dirY) return;
  nextX = x;
  nextY = y;
}

/* LOOP */
function loop(){

  if(!started || dead) return;

  dirX = nextX;
  dirY = nextY;

  let head = {
    x: snake[0].x + dirX,
    y: snake[0].y + dirY
  };

  if(
    head.x<0||head.y<0||
    head.x>=cols||head.y>=rows||
    snake.some(s=>s.x===head.x&&s.y===head.y)
  ){
    dead = true;
    loseSound.play();
    laughSound.play();
    stopCrazyTauntTimer();

    document.getElementById("gameover").style.display="flex";
    document.getElementById("scoreText").innerText =
      "رصيد الستر: " + score;

    return;
  }

  snake.unshift(head);

  if(head.x === food.x && head.y === food.y) {
    if(!crazy) {
      score += 10;
      eatSound.play();
      document.getElementById("ui").innerText = "رصيد الستر: " + score;
      food = getRandomSafeCell();
      crazyCounter = 0;
      farFromSnakeFrames = 0;
    } else {
      evadeNearby();
      snake.pop(); // نزيل الرأس لأننا لم نأكل
      draw();
      return;
    }
  } else {
    snake.pop();
  }

  if(crazy) {
    crazyCounter++;
    let distToFood = Math.abs(snake[0].x - food.x) + Math.abs(snake[0].y - food.y);
    
    if(distToFood <= 3) {
      evadeNearby();
      farFromSnakeFrames = 0;
    }
    
    if(crazyCounter % 20 === 0 && Math.random() < 0.3) {
      evadeNearby();
    }
    
    if(distToFood > 8) {
      farFromSnakeFrames++;
      if(farFromSnakeFrames > 60) {
        moveFoodTowardSnake();
        setTimeout(() => {
          if(crazy && !dead && started) evadeNearby();
        }, 200);
        farFromSnakeFrames = 0;
      }
    } else {
      farFromSnakeFrames = 0;
    }
    
    if(crazyCounter % 100 === 0 && Math.random() < 0.4) {
      evadeFarRandom();
    }
  }

  draw();
}

function draw(){
  ctx.fillStyle="#151515";
  ctx.fillRect(0,0,c.width,c.height);

  snake.forEach((s,i)=>{
    ctx.fillStyle = i===0 ? "#7cff5b" : "#43b943";
    ctx.fillRect(s.x*size,s.y*size,size-2,size-2);
  });

  ctx.fillStyle="red";
  ctx.fillRect(food.x*size,food.y*size,size-4,size-4);
}

function restartGame(){
  snake=[{x:10,y:10}];
  dirX=1;dirY=0;
  nextX=1;nextY=0;
  food=getRandomSafeCell();
  score=0;
  dead=false;
  crazyCounter=0;
  farFromSnakeFrames=0;
  
  stopCrazyTauntTimer();
  if (crazy && started) {
    startCrazyTauntTimer(true); // عند إعادة التشغيل، أول صوت سريع
  }

  document.getElementById("ui").innerText="رصيد الستر: 0";
  document.getElementById("gameover").style.display="none";
}

function goHome(){

  homeSound.currentTime = 0;
  homeSound.play();

  let fade = document.getElementById("fade");
  fade.style.opacity = "1";

  setTimeout(()=>{
    stopCrazyTauntTimer();
    document.getElementById("gameover").style.display="none";
    document.getElementById("startScreen").style.display="flex";

    snake=[{x:10,y:10}];
    score=0;
    dead=false;
    started=false;
    crazy=false;
    document.getElementById("crazyToggle").innerText = "CRAZY OFF";
    food={x:10,y:15};

    document.getElementById("ui").innerText="رصيد الستر: 0";

    fade.style.opacity="0";

  },2000);
}

setInterval(loop,220);

</script>

</body>
  </html>
