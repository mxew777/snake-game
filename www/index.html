<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Pro - تحكم دائري</title>
<style>
  * {
    user-select: none;
    touch-action: manipulation;
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
    padding: 12px;
    gap: 12px;
  }

  canvas {
    background: #151515;
    box-shadow: 0 0 0 2px #2a2a2a;
    display: block;
    margin: 0 auto;
  }

  #ui {
    position: absolute;
    top: 12px;
    left: 12px;
    color: yellow;
    font-size: 24px;
    font-weight: bold;
    background: rgba(0,0,0,0.5);
    padding: 6px 14px;
    border-radius: 40px;
    backdrop-filter: blur(4px);
    z-index: 20;
  }

  /* شاشة البداية والنهاية (نفس السابق) */
  #startScreen, #gameover {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 18px;
    z-index: 1000;
  }
  #startScreen {
    background: radial-gradient(circle at top, #1b1b1b, #000);
  }
  #gameover {
    background: rgba(0,0,0,0.84);
    display: none;
  }
  #title {
    font-size: 70px;
    font-weight: 900;
    color: #7cff5b;
    text-shadow: 0 0 10px #4ad14a, 0 0 30px #2fff2f;
    animation: pulse 1.8s infinite;
    text-align: center;
  }
  #subtitle {
    color: #aaa;
    font-size: 18px;
    letter-spacing: 2px;
    margin-top: -10px;
    text-align: center;
  }
  #startBtn, #crazyToggle {
    border: none;
    border-radius: 18px;
    cursor: pointer;
    font-weight: bold;
  }
  #startBtn {
    width: 240px;
    height: 70px;
    background: linear-gradient(145deg, #4ad14a, #2e9b2e);
    color: white;
    font-size: 28px;
  }
  #crazyToggle {
    width: 240px;
    height: 55px;
    background: #6a2cff;
    color: white;
    font-size: 20px;
  }
  #loseText {
    color: #ff4444;
    font-size: 42px;
    font-weight: bold;
    text-align: center;
  }
  #scoreText {
    color: yellow;
    font-size: 28px;
    margin-top: 18px;
  }
  #restartBtn {
    margin-top: 30px;
    width: 200px;
    height: 65px;
    border: none;
    border-radius: 20px;
    background: #4ad14a;
    color: white;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
  }
  .home-btn {
    margin-top: 15px;
    width: 60px;
    height: 60px;
    border: none;
    border-radius: 50%;
    font-size: 28px;
    background: #333;
    color: white;
    cursor: pointer;
  }

  /* ===== التحكم الدائري (十字 دائري) ===== */
  .dpad-circle {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 15px;
    width: 100%;
  }
  .dpad-grid {
    display: grid;
    grid-template-columns: 80px 80px 80px;
    grid-template-rows: 80px 80px 80px;
    gap: 10px;
    background: rgba(0,0,0,0.3);
    padding: 12px;
    border-radius: 120px;
    backdrop-filter: blur(10px);
  }
  .dpad-btn {
    background: #2c2e33;
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 36px;
    font-weight: bold;
    box-shadow: 0 5px 0 #121212;
    cursor: pointer;
    transition: 0.05s linear;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    touch-action: manipulation;
  }
  .dpad-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #121212;
  }
  /* زر وهمي في المنتصف (فارغ) */
  .empty-center {
    background: transparent;
    box-shadow: none;
    cursor: default;
  }
  .empty-center:active {
    transform: none;
    box-shadow: none;
  }

  @media (max-width: 550px) {
    .dpad-grid {
      grid-template-columns: 60px 60px 60px;
      grid-template-rows: 60px 60px 60px;
      gap: 8px;
    }
    .dpad-btn {
      font-size: 28px;
    }
    #title { font-size: 48px; }
    #ui { font-size: 18px; top: 8px; left: 8px; }
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
<div id="ui">رصيد الستر: 0</div>
<div id="startScreen">
  <div id="title">SNAKE</div>
  <div id="subtitle">𝖉𝖊𝖛𝖊𝖑𝖔𝖕𝖊𝖉 𝖇𝖞<br>𝐅 𝐀 𝐍 𝐆  𝐘 𝐔 𝐀 𝐍</div>
  <button id="startBtn" onclick="startGame(); playAhh()">START GAME</button>
  <button id="crazyToggle" onclick="toggleCrazy(); playAhh()">CRAZY OFF</button>
</div>
<div id="gameover">
  <div id="loseText">ههههه خسرت يقحبة</div>
  <div id="scoreText">رصيد الستر: 0</div>
  <button id="restartBtn" onclick="restartGame()">Restart</button>
  <button class="home-btn" onclick="goHome()">🏠</button>
</div>

<div class="game-container">
  <canvas id="game" width="400" height="600"></canvas>
  <!-- تحكم دائري على شكل صليب -->
  <div class="dpad-circle">
    <div class="dpad-grid">
      <div></div>
      <button class="dpad-btn" id="upBtn" onclick="setDir(0,-1)">▲</button>
      <div></div>
      <button class="dpad-btn" id="leftBtn" onclick="setDir(-1,0)">◄</button>
      <div class="dpad-btn empty-center"></div>
      <button class="dpad-btn" id="rightBtn" onclick="setDir(1,0)">►</button>
      <div></div>
      <button class="dpad-btn" id="downBtn" onclick="setDir(0,1)">▼</button>
      <div></div>
    </div>
  </div>
</div>

<div id="fade" style="position:fixed; inset:0; background:black; opacity:0; pointer-events:none; transition:opacity 1.5s; z-index:9999;"></div>

<script>
/* ===== الصوتيات (محلية) ===== */
const eatSound = new Audio("eat.mp3");
const loseSound = new Audio("lose.mp3");
const laughSound = new Audio("laugh.mp3");
const homeSound = new Audio("home.mp3");
const ahhSound = new Audio("ahh.mp3");
const tauntSounds = [];
for(let i = 1; i <= 24; i++) tauntSounds.push(new Audio(`taunt${i}.mp3`));

let tauntTimer = null;
let isTauntPlaying = false;

function playRandomTaunt() {
  if (!crazy) return;
  if (isTauntPlaying) return;
  let idx = Math.floor(Math.random() * tauntSounds.length);
  let snd = tauntSounds[idx];
  snd.currentTime = 0;
  isTauntPlaying = true;
  snd.onended = () => { isTauntPlaying = false; };
  snd.play().catch(e=>console.log);
}
function startCrazyTauntTimer(isFirst=false) {
  if (tauntTimer) clearTimeout(tauntTimer);
  if (!crazy || !started || dead) return;
  let delay = isFirst ? (Math.random() * 8000 + 2000) : (Math.random() * 25000 + 5000);
  tauntTimer = setTimeout(() => {
    if (crazy && started && !dead) { playRandomTaunt(); startCrazyTauntTimer(false); }
  }, delay);
}
function stopCrazyTauntTimer() { if (tauntTimer) clearTimeout(tauntTimer); tauntTimer = null; }

/* ===== GAME LOGIC ===== */
const c = document.getElementById("game");
const ctx = c.getContext("2d");
let crazy = false, started = false, dead = false;
const COLS = 20, ROWS = 30;
let snake = [{x:10,y:10}];
let dirX = 1, dirY = 0, nextX = 1, nextY = 0;
let score = 0;
let food = {x:10,y:15};
let crazyCounter = 0, farFromSnakeFrames = 0;
let cellSize = 20, canvasWidth = 400, canvasHeight = 600;

function isSafeCell(x,y) { return !snake.some(s=>s.x===x && s.y===y); }
function getRandomSafeCell() {
  let safe = [];
  for(let i=0;i<COLS;i++) for(let j=0;j<ROWS;j++) if(isSafeCell(i,j)) safe.push({x:i,y:j});
  if(safe.length===0) return {x:5,y:5};
  return safe[Math.floor(Math.random()*safe.length)];
}
function getNearbySafeCell(maxDist) {
  let cand = [];
  for(let dx=-maxDist;dx<=maxDist;dx++) for(let dy=-maxDist;dy<=maxDist;dy++) {
    let nx = food.x+dx, ny = food.y+dy;
    if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && isSafeCell(nx,ny) && !(dx===0 && dy===0)) {
      let d = Math.abs(dx)+Math.abs(dy);
      if(d<=maxDist) cand.push({x:nx,y:ny,dist:d});
    }
  }
  if(cand.length===0) return getRandomSafeCell();
  cand.sort((a,b)=>a.dist-b.dist);
  return cand[Math.floor(Math.random()*Math.min(3,cand.length))];
}
function evadeNearby() { let np = getNearbySafeCell(4); if(np) food = np; }
function evadeFarRandom() { let np = getRandomSafeCell(); if(np) food = np; }
function moveFoodTowardSnake() {
  let head = snake[0];
  let best = null, bestDist = Infinity;
  let dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  for(let d of dirs) {
    let nx = food.x+d[0], ny = food.y+d[1];
    if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS && isSafeCell(nx,ny)) {
      let dist = Math.abs(nx-head.x)+Math.abs(ny-head.y);
      if(dist<bestDist) { bestDist=dist; best={x:nx,y:ny}; }
    }
  }
  if(best) food = best;
}

function resizeCanvas() {
  const container = document.querySelector('.game-container');
  const maxWidth = container.clientWidth - 20;
  const maxHeight = window.innerHeight * 0.7;
  let cellW = Math.floor(maxWidth / COLS);
  let cellH = Math.floor(maxHeight / ROWS);
  let newSize = Math.min(cellW, cellH);
  if (newSize < 8) newSize = 8;
  cellSize = newSize;
  canvasWidth = COLS * cellSize;
  canvasHeight = ROWS * cellSize;
  c.width = canvasWidth;
  c.height = canvasHeight;
  draw();
}
function draw() {
  ctx.fillStyle = "#151515";
  ctx.fillRect(0,0,canvasWidth,canvasHeight);
  snake.forEach((s,i)=>{
    ctx.fillStyle = i===0 ? "#7cff5b" : "#43b943";
    ctx.fillRect(s.x*cellSize, s.y*cellSize, cellSize-2, cellSize-2);
  });
  ctx.fillStyle = "red";
  ctx.fillRect(food.x*cellSize, food.y*cellSize, cellSize-4, cellSize-4);
}
function startGame() {
  document.getElementById("startScreen").style.display = "none";
  started = true;
  crazyCounter = 0; farFromSnakeFrames = 0;
  if (crazy) startCrazyTauntTimer(true);
  resizeCanvas();
}
function toggleCrazy() {
  crazy = !crazy;
  document.getElementById("crazyToggle").innerText = crazy ? "CRAZY ON" : "CRAZY OFF";
  crazyCounter = 0; farFromSnakeFrames = 0;
  if (crazy && started && !dead) startCrazyTauntTimer(true);
  else stopCrazyTauntTimer();
}
function playAhh() { ahhSound.currentTime=0; ahhSound.play(); }
function setDir(x,y) { if(x===-dirX && y===-dirY) return; nextX=x; nextY=y; }

function loop() {
  if(!started || dead) return;
  dirX = nextX; dirY = nextY;
  let head = { x: snake[0].x + dirX, y: snake[0].y + dirY };
  if(head.x<0||head.y<0||head.x>=COLS||head.y>=ROWS || snake.some(s=>s.x===head.x&&s.y===head.y)) {
    dead = true;
    loseSound.play(); laughSound.play(); stopCrazyTauntTimer();
    document.getElementById("gameover").style.display="flex";
    document.getElementById("scoreText").innerText = "رصيد الستر: " + score;
    return;
  }
  snake.unshift(head);
  if(head.x===food.x && head.y===food.y) {
    if(!crazy) {
      score += 10; eatSound.play();
      document.getElementById("ui").innerText = "رصيد الستر: " + score;
      food = getRandomSafeCell();
      crazyCounter=0; farFromSnakeFrames=0;
    } else {
      evadeNearby();
      snake.pop(); draw(); return;
    }
  } else { snake.pop(); }
  if(crazy) {
    crazyCounter++;
    let dist = Math.abs(snake[0].x-food.x)+Math.abs(snake[0].y-food.y);
    if(dist<=3) { evadeNearby(); farFromSnakeFrames=0; }
    if(crazyCounter%20===0 && Math.random()<0.3) evadeNearby();
    if(dist>8) {
      farFromSnakeFrames++;
      if(farFromSnakeFrames>60) {
        moveFoodTowardSnake();
        setTimeout(()=>{ if(crazy&&!dead&&started) evadeNearby(); },200);
        farFromSnakeFrames=0;
      }
    } else farFromSnakeFrames=0;
    if(crazyCounter%100===0 && Math.random()<0.4) evadeFarRandom();
  }
  draw();
}
function restartGame() {
  snake = [{x:10,y:10}];
  dirX=1; dirY=0; nextX=1; nextY=0;
  food = getRandomSafeCell();
  score=0; dead=false; crazyCounter=0; farFromSnakeFrames=0;
  stopCrazyTauntTimer();
  if(crazy && started) startCrazyTauntTimer(true);
  document.getElementById("ui").innerText = "رصيد الستر: 0";
  document.getElementById("gameover").style.display="none";
  resizeCanvas();
}
function goHome() {
  homeSound.currentTime=0; homeSound.play();
  let fade = document.getElementById("fade");
  fade.style.opacity="1";
  setTimeout(()=>{
    stopCrazyTauntTimer();
    document.getElementById("gameover").style.display="none";
    document.getElementById("startScreen").style.display="flex";
    snake=[{x:10,y:10}]; score=0; dead=false; started=false; crazy=false;
    document.getElementById("crazyToggle").innerText="CRAZY OFF";
    food={x:10,y:15};
    document.getElementById("ui").innerText="رصيد الستر: 0";
    fade.style.opacity="0";
    resizeCanvas();
  },2000);
}
window.addEventListener('resize', ()=>{ if(started && !dead) resizeCanvas(); });
window.addEventListener('orientationchange', ()=>{ setTimeout(()=>{ if(started && !dead) resizeCanvas(); },100); });
setInterval(loop, 220);
resizeCanvas();
</script>
</body>
</html>
